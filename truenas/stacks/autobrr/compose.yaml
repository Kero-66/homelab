services:
  autobrr:
    image: ghcr.io/autobrr/autobrr:v1.79.0
    container_name: autobrr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Brisbane
    volumes:
      - /mnt/Fast/docker/autobrr/config:/config
    ports:
      - "7474:7474"
    networks:
      - default
      - arr-stack_default
      - downloaders_default
    labels:
      - homepage.group=Downloads
      - homepage.name=autobrr
      - homepage.icon=autobrr
      - homepage.href=http://autobrr.home
      - homepage.description=Release automation

networks:
  arr-stack_default:
    external: true
  downloaders_default:
    external: true
