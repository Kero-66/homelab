# =============================================================================
# Commafeed Stack - TrueNAS Scale
# =============================================================================
# Self-hosted RSS reader with PostgreSQL backend.
#
# Storage layout:
#   Config → /mnt/Fast/docker/commafeed/        (NVMe pool - app data)
#   DB     → /mnt/Fast/databases/commafeed/postgres/ (NVMe pool - database)
#   .env   → /mnt/Fast/docker/commafeed/.env    (NVMe - secrets from Infisical)
#
# Secrets:
#   Managed by Infisical Agent → writes .env to /mnt/Fast/docker/commafeed/.env
#   Template: truenas/stacks/infisical-agent/commafeed.tmpl
#   Source: Infisical /TrueNAS path
#
# =============================================================================

services:
  commafeed-db:
    image: postgres:16-alpine
    container_name: commafeed-db
    restart: unless-stopped
    mem_limit: 256m
    env_file:
      - /mnt/Fast/docker/commafeed/.env
    environment:
      - POSTGRES_DB=commafeed
    volumes:
      - /mnt/Fast/databases/commafeed/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commafeed -d commafeed"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  commafeed:
    image: athou/commafeed:latest-postgresql
    container_name: commafeed
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      commafeed-db:
        condition: service_healthy
    labels:
      - homepage.group=RSS
      - homepage.name=Commafeed
      - homepage.icon=mdi-rss
      - homepage.href=http://rss.home
      - homepage.description=RSS reader
    env_file:
      - /mnt/Fast/docker/commafeed/.env
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://commafeed-db:5432/commafeed
    volumes:
      - /mnt/Fast/docker/commafeed/data:/commafeed/data
    # Port 8082 conflicts with TrueNAS nginx on the host — use 8088 instead
    ports:
      - "8088:8082"
    healthcheck:
      test: ["CMD-SHELL", "[ -f /proc/1/cmdline ] && exit 0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
